[tools]
age = "latest"
ast-grep = "latest"
bat = "latest"
biome = "2.3.12"
"cargo:procs" = "latest"
claude = "latest"
codex = "latest"
delta = "latest"
direnv = "latest"
dust = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
go = "1.26"
"go:github.com/cespare/reflex" = "latest"
java = "lts"
jq = "latest"
lazygit = "latest"
node = "22"
pnpm = "10"
ripgrep = "latest"
rust = "latest"
tmux = "latest"
usage = "2.13.1"
yq = "latest"
zoxide = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]

[tasks.restart-cursor]
description = "Restart Cursor with updated mise environment"
run = "{{env.REPOS}}/dotfiles/scripts/restart-cursor.sh"

[env]
_.file = ".env"
_.path = ["~/tools/bin"]
